<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>A Weber Site</title>

<style>
:root {
  --rh-green: #00c805;
  --rh-black: #0b0d0e;
  --rh-card: #121517;
  --rh-border: rgba(255,255,255,.08);
  --rh-text: #f5f8f6;
  --rh-muted: #a8b3ad;
}

body {
  margin:0;
  font-family:system-ui;
  background:var(--rh-black);
  color:var(--rh-text);
}

.wrap {
  max-width:1160px;
  margin:auto;
  padding:20px;
}

.card {
  background:var(--rh-card);
  border:1px solid var(--rh-border);
  border-radius:16px;
  padding:20px;
}

.grid {
  display:grid;
  grid-template-columns:1.15fr .85fr;
  gap:20px;
}

@media (max-width:900px){
  .grid { grid-template-columns:1fr; }
}

.h-500 {
  height:500px;
  min-height:0;
}

.scroll {
  overflow:auto;
